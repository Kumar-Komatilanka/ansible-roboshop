- name: Redis configuration
  hosts: redis
  become: yes
  tasks:
  - name: disable redis default version
    ansible.builtin.command: dnf module disable redis -y

  - name: enabling redis:7
    ansible.builtin.command: dnf module enable redis:7 -y
  
  - name: install redis
    ansible.builtin.dnf:
      name: redis
      state: present
  
  - name: allow remote connections
    ansible.builtin.replace:  #replace → changes part of a line.
      path: /etc/redis/redis.conf
      regexp: '127.0.0.1'
      replace: '0.0.0.0'

  - name: disable protected mode 
    ansible.builtin.lineinfile: # here we are using replace line module where it will search for entire line and replace key word
                                #lineinfile → replaces or enforces the entire line.
      path: /etc/redis/redis.conf
      regexp: 'protected-mode'
      line: protected-mode no
  - name: enable and start redis
    ansible.builtin.service:
      name: redis
      state: started
      enabled: yes