- name: Configure catalogue application
  hosts: catalogue
  become: yes
  tasks:
  - name: disabling default node js version
    ansible.builtin.command: dnf module disable nodejs -y

  - name: enabling latest version
    ansible.builtin.command: dnf module enable nodejs:20 -y

  - name: installing node js
    ansible.builtin.dnf:
      name: nodejs
      state: present

  - name: creating system user
    ansible.builtin.user:
      name: roboshop
      shell: /sbin/nologin
      home: /app
      system: true

  - name: creating user directory
    ansible.builtin.file:
      path: /app
      state: directory
    
  - name: Downloading application
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
      dest: /tmp/catalogue.zip

  - name: extracting the downloaded command_result
    ansible.builtin.unarchive:
      src: /tmp/catalogue.zip
      dest: /app
      remote_src: yes

  - name: install dependencies
    community.general.npm:
      path: /app
  
  - name: copy catalogue service to system directory
    ansible.builtin.copy:
      src: catalogue.service
      dest: /etc/systemd/system/catalogue.service

  - name: systemctl deamon reload
    ansible.builtin.systemd_service:
      daemon_reload: true

  - name: start and enable catalogue
    ansible.builtin.service:
      name: catalogue
      state: started
      enabled: yes

  - name: copy mongodb repo
    ansible.builtin.copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo
  
  - name: install mongodb client
    ansible.builtin.dnf:
      name: mongodb-mongosh
      state: present

  - name: check products loaded or not
    ansible.builtin.command: mongosh --host mongodb.komatilanka.store --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
    register: catalogue_output #here we are storing output of above command to catalogue_output
  
  - name: print catalogue output
    ansible.builtin.debug:
      msg: "{{ catalogue_output }}"
  
  - name: load products
    ansible.builtin.shell: mongosh --host mongodb.komatilanka.store < /app/db/master-data.js # here we have used shell module as we have redirections
    when: catalogue_output.stdout | int < 0  # here we have written logic to load data only if it does not exists
  